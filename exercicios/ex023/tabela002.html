<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }
      table {
        width: 500px;
        border-collapse: collapse;
        position: relative;
      }
      td,
      th {
        border: 1px solid black;
        padding: 10px;
      }
      thead, tfoot {
        background-color: #5d5d5d;
      }
      thead > tr > th {
        position: sticky;
        top: -1px;
        background-color: #5d5d5d; ;
      }
      .num {
        text-align: right;
      }
      tbody tr:nth-child(2n){
        background-color: lightgrey;
      }
    </style>
  </head>
  <body>
    <h1>Uso de tabelas Grandes</h1>
    <!--   ANATOMIA PARA TABELAS GRANDES
    TABLE
    CAPTION
     THEAD
      tr, td, th
     TBODY
        tr, td, th
     TFOOT
      tr, td, th 
      
      -->
    <table>
        <caption>População dos Estados Brasileiros</caption>
      <thead>
        <tr>
          <th scope="col">Estado</th>
          <th scope="col" style="width: 50px;">População</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>São Paulo</td>
          <td class="num">45.919.049</td>
        </tr>
        
        <tr>
          <td>Minas Gerais</td>
          <td class="num">21.293.000</td>
        </tr>
        <tr>
          <td>Rio de Janeiro</td>
          <td class="num">17.264.943</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th scope="row">Total de Habitantes</th>
          <td class="num"><strong>84.476.992</strong></td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
